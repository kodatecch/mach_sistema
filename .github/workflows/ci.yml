name: STEM Racing Project CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-build:
    name: Lint & Build Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Monorepo Node Dependencies
        run: npm ci || npm install

      - name: Code Linting Checking
        run: npm run lint

      - name: Compile and Build Assets
        run: npm run build
